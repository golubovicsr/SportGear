<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Vaša korpa - SportGear"/>
    <title>SportGear - Korpa</title>
    <link rel="icon" type="image/x-icon" href="assets/img/logo.ico"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="assets/css/style.css"/>
    <link rel="stylesheet" href="assets/css/responsive.css"/>
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-light shadow-sm fixed-top">
            <div class="container">
                <a class="navbar-brand fw-bold fs-3" href="index.html">SportGear</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto" id="dynamicMenu">
                        <!-- Dinamički ispisujem meni -->
                    </ul>
                </div>
                <div class="ms-3">
                    <a href="cart.html" class="text-dark text-decoration-none">
                        <span id="totalPrice" class="me-2">$0.00</span>
                        <span class="cart-icon position-relative">
                            <i class="fa-solid fa-cart-shopping fs-5"></i>
                            <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                        </span>
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container mt-5 pt-5">
        <h1 class="text-center mb-5">Vaša korpa</h1>
        
        <div id="cartContent">
            <!-- Sadržaj korpe ispisujem dinamički -->
        </div>
    </main>

    <div class="modal fade" id="orderModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Poručivanje</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="orderForm">
                        <div class="mb-3">
                            <label for="firstName" class="form-label">Ime</label>
                            <input type="text" class="form-control" id="firstName">
                            <small class="text-danger"></small>
                        </div>
                        
                        <div class="mb-3">
                            <label for="lastName" class="form-label">Prezime</label>
                            <input type="text" class="form-control" id="lastName">
                            <small class="text-danger"></small>
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email">
                            <small class="text-danger"></small>
                        </div>
                        
                        <div class="mb-3">
                            <label for="phone" class="form-label">Telefon</label>
                            <input type="text" class="form-control" id="phone" placeholder="061/1234567">
                            <small class="text-danger"></small>
                        </div>
                        
                        <div class="mb-3">
                            <label for="delivery" class="form-label">Način dostave</label>
                            <select class="form-select" id="delivery">
                                <option value="">Izaberite...</option>
                                <option value="standard">Standardna dostava (3-5 dana)</option>
                                <option value="express">Express dostava (1-2 dana)</option>
                                <option value="pickup">Lično preuzimanje</option>
                            </select>
                            <small class="text-danger"></small>
                        </div>
                        
                        <div class="mb-3">
                            <label for="deliveryDate" class="form-label">Predviđeni datum isporuke</label>
                            <input type="text" class="form-control" id="deliveryDate" readonly>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Otkaži</button>
                    <button type="button" class="btn btn-success" id="submitOrder">Poruči</button>
                </div>
            </div>
        </div>
    </div>
    <div id="toastMessage" class="toast-success"></div>

    <footer class="bg-dark text-light pt-5 mt-5">
        <div class="container" id="footerContent">
            <!-- Footer sadržaj iz JSON-a -->
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/cart.js"></script>
</body>
</html>
