<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SportGear prodavnica - Najširi izbor sportske opreme">
     <link rel="icon" type="image/x-icon" href="assets/img/logo.ico"/>
    <title>SportGear - Prodavnica</title>
    
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-light shadow-sm fixed-top">
            <div class="container">
                <a class="navbar-brand fw-bold fs-3" href="index.html">SportGear</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto" id="dynamicMenu">
                    
                    </ul>
                </div>
                <div class="ms-3">
                    <a href="cart.html" class="text-dark text-decoration-none">
                        <span id="totalPrice" class="me-2">$0.00</span>
                        <span class="cart-icon position-relative">
                            <i class="fa-solid fa-cart-shopping fs-5"></i>
                            <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                        </span>
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container mt-5 pt-5">
        <h1 class="text-center mb-4">Prodavnica sportske opreme</h1>
        
        <div class="row">
            <div class="col-lg-3 mb-4">
                <div class="bg-light p-3 rounded">
                    <h5>Pretraga</h5>
                    <input type="text" id="searchInput" class="form-control mb-3" placeholder="Pretraži proizvode...">
                    
                    <h5>Sortiraj po</h5>
                    <select id="sortSelect" class="form-select mb-3">
                        <option value="0">Podrazumevano</option>
                        <option value="1">Cena rastuće</option>
                        <option value="2">Cena opadajuće</option>
                        <option value="3">Naziv A-Š</option>
                        <option value="4">Naziv Š-A</option>
                        <option value="5">Popularnost</option>
                    </select>
                    
                    <div id="filterContainer">
                    
                    </div>
                </div>
            </div>
            
            <div class="col-lg-9">
                <div class="row" id="productsContainer">
                   
                </div>
                <nav aria-label="Paginacija" class="mt-4">
                    <ul class="pagination justify-content-center" id="pagination">
                    
                    </ul>
                </nav>
            </div>
        </div>
    </main>

  
    <footer class="bg-dark text-light pt-5 mt-5">
        <div class="container" id="footerContent">
         
        </div>
    </footer>

    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Zatvori</button>
                    <button type="button" class="btn btn-success" id="modalAddToCart">Dodaj u korpu</button>
                </div>
            </div>
        </div>
    </div>

  
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/shop.js"></script>
</body>
</html>
